name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

env:
  BUILD_TYPE: Release

jobs:
  # ==========================================
  # ROS2 BUILD & TEST
  # ==========================================
  ros2-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - ros_distro: humble
            os: ubuntu-22.04
          - ros_distro: jazzy
            os: ubuntu-24.04

    runs-on: ${{ matrix.os }}
    container:
      image: ros:${{ matrix.ros_distro }}-ros-base

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y python3-colcon-common-extensions python3-rosdep
          rosdep update --rosdistro ${{ matrix.ros_distro }}
          rosdep install --from-paths . --ignore-src -y

      - name: Build
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          colcon build --cmake-args -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Test
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          source install/setup.bash
          colcon test
          colcon test-result --verbose

  # ==========================================
  # STANDALONE CMAKE BUILD
  # ==========================================
  standalone-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            compiler: gcc
            cc: gcc-14
            cxx: g++-14
            pkg: g++-14
          - os: ubuntu-24.04
            compiler: clang
            cc: clang-18
            cxx: clang++-18
            pkg: clang-18

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libgtest-dev ${{ matrix.pkg }}
          cd /usr/src/gtest
          sudo cmake -B build -G Ninja
          sudo cmake --build build
          sudo cmake --install build

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTING=ON \
            -DBUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ==========================================
  # SANITIZERS (ASan + UBSan)
  # ==========================================
  sanitizers:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libgtest-dev g++-14
          cd /usr/src/gtest
          sudo cmake -B build -G Ninja
          sudo cmake --build build
          sudo cmake --install build

      - name: Configure with sanitizers
        env:
          CC: gcc-14
          CXX: g++-14
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
            -DBUILD_TESTING=ON \
            -DBUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build

      - name: Test under sanitizers
        run: ctest --test-dir build --output-on-failure

  # ==========================================
  # PERFORMANCE BENCHMARKS
  # ==========================================
  benchmarks:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-14

      - name: Configure
        env:
          CC: gcc-14
          CXX: g++-14
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DBUILD_BENCHMARKS=ON \
            -DBUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build

      - name: Run benchmarks
        run: ./build/behavior_tree_lite_bench

  # ==========================================
  # FORMAT CHECK
  # ==========================================
  format-check:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          find include test examples -name '*.hpp' -o -name '*.cpp' | \
            xargs clang-format-18 --dry-run --Werror

  # ==========================================
  # STATIC ANALYSIS
  # ==========================================
  static-analysis:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy-18 clang-18 cmake

      - name: Configure
        env:
          CC: clang-18
          CXX: clang++-18
        run: |
          cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: |
          clang-tidy-18 \
            -p build \
            --warnings-as-errors='*' \
            include/behavior_tree_lite/*.hpp \
            include/behavior_tree_lite/nodes/*.hpp

  # ==========================================
  # DOCUMENTATION CHECK
  # ==========================================
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check README
        run: test -f README.md

      - name: Check LICENSE
        run: test -f LICENSE
